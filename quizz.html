<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kuis PAI — 50 Soal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --pri:#4338ca;--pri2:#6d28d9;--ok:#10b981;--ok2:#065f46;--bad:#ef4444;--bad2:#991b1b;
  --bg:#f0f4ff;--card:#fff;--border:#e2e8f0;--t1:#0f172a;--t2:#334155;--t3:#64748b;
  --r:16px;--sh:0 8px 48px rgba(67,56,202,.11),0 2px 10px rgba(0,0,0,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:24px 16px 60px;
  background-image:radial-gradient(circle at 1px 1px,rgba(99,102,241,.12) 1px,transparent 0);
  background-size:28px 28px;
}
/* CARD */
.card{width:100%;max-width:660px;background:var(--card);border-radius:24px;box-shadow:var(--sh);overflow:hidden}
/* HEADER */
.hdr{
  background:linear-gradient(135deg,var(--pri) 0%,var(--pri2) 100%);
  padding:18px 22px;display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.hdr-l .title{color:#fff;font-size:17px;font-weight:800;letter-spacing:-.3px}
.hdr-l .sub{color:rgba(255,255,255,.6);font-size:11.5px;margin-top:1px;font-weight:500}
.hdr-r{display:flex;align-items:center;gap:8px;flex-shrink:0}
.pill{background:rgba(255,255,255,.18);color:#fff;font-size:12px;font-weight:700;padding:5px 12px;border-radius:30px;white-space:nowrap;min-width:52px;text-align:center}
.btn-sh{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.28);
  color:#fff;font-size:12px;font-weight:700;padding:6px 12px;border-radius:30px;
  cursor:pointer;transition:all .2s;white-space:nowrap;font-family:'Outfit',sans-serif;
}
.btn-sh:hover{background:rgba(255,255,255,.25)}
.btn-sh.on{background:#fff;color:var(--pri);border-color:#fff}
/* PROGRESS */
.prog-track{background:#dde3f4;height:5px}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--pri),var(--pri2));transition:width .5s cubic-bezier(.4,0,.2,1);border-radius:0 4px 4px 0}
/* BODY */
.body{padding:24px 22px 22px;animation:aIn .22s ease}
@keyframes aIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
/* QUESTION */
.q-badge{
  display:inline-flex;align-items:center;gap:7px;
  background:#ede9fe;color:var(--pri);font-size:11px;font-weight:700;
  padding:4px 11px;border-radius:30px;letter-spacing:.4px;text-transform:uppercase;margin-bottom:16px;
}
.q-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--pri);opacity:.5}
.q-txt{font-size:17px;font-weight:700;color:var(--t1);line-height:1.6;margin-bottom:20px}
/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:9px}
.opt{
  display:flex;align-items:center;gap:13px;
  padding:13px 16px;border:2px solid var(--border);border-radius:14px;
  cursor:pointer;background:#fff;transition:border-color .17s,background .17s,transform .15s;
  user-select:none;-webkit-tap-highlight-color:transparent;will-change:transform;
}
.opt:hover:not(.dis):not(.ok):not(.bad){border-color:var(--pri);background:#f5f3ff;transform:translateX(4px)}
.opt:active:not(.dis){transform:scale(.98)}
.ol{
  width:36px;height:36px;border-radius:50%;background:#f1f5f9;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:13px;color:var(--t3);flex-shrink:0;transition:background .2s,color .2s;
}
.ot{font-size:14.5px;color:var(--t2);line-height:1.45;flex:1;font-weight:500}
/* CORRECT */
.opt.ok{border-color:var(--ok);background:#ecfdf5;animation:aBounce .55s cubic-bezier(.34,1.56,.64,1)}
.opt.ok .ol{background:var(--ok);color:#fff}
.opt.ok .ot{color:var(--ok2);font-weight:700}
/* WRONG */
.opt.bad{border-color:var(--bad);background:#fff1f2;animation:aShake .5s cubic-bezier(.36,.07,.19,.97)}
.opt.bad .ol{background:var(--bad);color:#fff}
.opt.bad .ot{color:var(--bad2);font-weight:600}
.opt.dis{cursor:default;pointer-events:none}

@keyframes aBounce{
  0%{transform:scale(1)}35%{transform:scale(1.04) translateX(3px)}
  65%{transform:scale(.97)}85%{transform:scale(1.02)}100%{transform:scale(1)}
}
@keyframes aShake{
  0%,100%{transform:translateX(0)}15%{transform:translateX(-9px)}
  30%{transform:translateX(7px)}50%{transform:translateX(-5px)}
  70%{transform:translateX(4px)}85%{transform:translateX(-2px)}
}
/* FEEDBACK */
.fb{margin-top:13px;padding:13px 15px;border-radius:12px;font-size:14px;font-weight:600;display:none;line-height:1.45}
.fb.show{display:block;animation:aIn .22s ease}
.fb.ok-fb{background:#ecfdf5;color:var(--ok2);border:1.5px solid #a7f3d0}
.fb.bad-fb{background:#fff1f2;color:var(--bad2);border:1.5px solid #fecaca}
/* NEXT BTN */
.btn-nxt{
  margin-top:13px;width:100%;padding:14px;border:none;border-radius:13px;
  background:linear-gradient(135deg,var(--pri),var(--pri2));
  color:#fff;font-size:15px;font-weight:800;cursor:pointer;letter-spacing:.2px;
  transition:opacity .2s,transform .1s;display:none;font-family:'Outfit',sans-serif;
}
.btn-nxt.show{display:block;animation:aIn .22s ease}
.btn-nxt:hover{opacity:.9}
.btn-nxt:active{transform:scale(.98)}
/* END SCREEN */
.end{padding:36px 24px 30px;text-align:center}
.end-emoji{font-size:56px;margin-bottom:8px}
.end-title{font-size:24px;font-weight:900;color:var(--t1);margin-bottom:4px}
.end-sub{color:var(--t3);font-size:13px;font-weight:500;margin-bottom:28px}
.big-s{
  font-size:92px;font-weight:900;line-height:1;
  background:linear-gradient(135deg,var(--pri),var(--pri2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:4px;
}
.s-sub{color:var(--t3);font-size:14px;font-weight:600;margin-bottom:26px}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.stat{border-radius:18px;padding:20px 12px;text-align:center}
.stat.g{background:#ecfdf5;border:1.5px solid #a7f3d0}
.stat.r{background:#fff1f2;border:1.5px solid #fecaca}
.stat-n{font-size:44px;font-weight:900;line-height:1}
.stat.g .stat-n{color:var(--ok)}
.stat.r .stat-n{color:var(--bad)}
.stat-l{font-size:13px;color:var(--t3);margin-top:5px;font-weight:600}
.btn-row{display:flex;flex-direction:column;gap:10px}
.btn-main{
  padding:14px;border:none;border-radius:13px;
  background:linear-gradient(135deg,var(--pri),var(--pri2));
  color:#fff;font-size:15px;font-weight:800;cursor:pointer;
  transition:opacity .2s,transform .1s;font-family:'Outfit',sans-serif;
}
.btn-main:hover{opacity:.9}
.btn-main:active{transform:scale(.98)}
.btn-out{
  padding:14px;border:2px solid var(--border);border-radius:13px;
  background:#fff;color:var(--t2);font-size:15px;font-weight:800;
  cursor:pointer;transition:border-color .2s,color .2s;font-family:'Outfit',sans-serif;
}
.btn-out:hover{border-color:var(--bad);color:var(--bad)}
.all-ok{color:var(--ok);font-weight:700;font-size:16px;padding:14px;background:#ecfdf5;border-radius:13px;border:1.5px solid #a7f3d0}
/* REVIEW */
.rv{padding:20px 22px 28px}
.rv-hdr{display:flex;align-items:center;gap:13px;margin-bottom:22px}
.btn-bk{
  background:#f1f5f9;border:none;width:40px;height:40px;border-radius:50%;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:18px;color:var(--t2);flex-shrink:0;transition:background .2s;font-family:'Outfit',sans-serif;
}
.btn-bk:hover{background:var(--border)}
.rv-title{font-size:19px;font-weight:800;color:var(--t1)}
.rv-count{font-size:12.5px;color:var(--t3);font-weight:500;margin-top:2px}
.rv-item{background:#fff;border:1.5px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.rv-n{font-size:10.5px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:7px}
.rv-q{font-size:14px;font-weight:700;color:var(--t1);line-height:1.45;margin-bottom:13px}
.rv-row{display:flex;align-items:flex-start;gap:9px;margin-bottom:8px}
.rv-row:last-child{margin-bottom:0}
.rv-badge{font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:8px;flex-shrink:0;margin-top:1px;letter-spacing:.2px}
.bx{background:#fff1f2;color:var(--bad)}
.bok{background:#ecfdf5;color:var(--ok)}
.rv-ans{font-size:13px;color:var(--t3);line-height:1.45}
.rv-ans.c{font-weight:700;color:var(--ok2)}
/* PARTICLES */
.pk{
  position:fixed;pointer-events:none;z-index:9999;
  animation:pkAnim linear forwards;
}
@keyframes pkAnim{
  0%{opacity:1;transform:translate(0,0) rotate(0deg) scale(1)}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) rotate(var(--dr)) scale(0)}
}
/* MOBILE */
@media(max-width:520px){
  body{padding:0 0 48px;background-size:22px 22px}
  .card{border-radius:0;min-height:100vh;box-shadow:none}
  .q-txt{font-size:15.5px}
  .big-s{font-size:74px}
  .hdr{padding:15px 16px}
  .body{padding:18px 16px 18px}
  .end{padding:28px 18px 24px}
  .rv{padding:16px 16px 28px}
  .hdr-l .title{font-size:15px}
}
</style>
</head>
<body>
<div class="card">
  <div class="hdr">
    <div class="hdr-l">
      <div class="title">📚 Kuis PAI</div>
      <div class="sub" id="hs">50 Soal</div>
    </div>
    <div class="hdr-r">
      <button class="btn-sh" id="bsh" onclick="toggleShuffle()">🔀 Acak</button>
      <div class="pill" id="pl">0/0</div>
    </div>
  </div>
  <div class="prog-track"><div class="prog-bar" id="pb" style="width:0%"></div></div>
  <div id="main"></div>
</div>

<script>
const B=[
{q:'Dalam Q.S. Al-Isra: 32, Allah SWT melarang manusia untuk...',opts:['Berbuat syirik','Mendekati zina','Meninggalkan sholat','Menghina orang tua','Berbuat riya'],ans:1},
{q:"Penggalan 'Wa laa taqrabuz zinaa' artinya...",opts:['Dan janganlah kamu melakukan zina','Dan janganlah kamu mendekati zina','Sesungguhnya zina itu perbuatan keji','Zina adalah dosa besar','Hindarilah perbuatan keji'],ans:1},
{q:"Hukum bacaan 'Al' pada kata az-zinaa (الزِّنَا) termasuk...",opts:['Al qamariyah','Al syamsiyah','Ikhfa syafawi','Idgham bighunnah','Mad thabii'],ans:1},
{q:'Hukuman bagi pezina ghairu muhshan (belum menikah) menurut Q.S. An-Nur: 2 adalah...',opts:['Dirajam sampai mati','100 kali cambukan','80 kali cambukan','Dipenjara 1 tahun','Diasingkan 6 bulan'],ans:1},
{q:"Zina disebut 'fahisyah' yang artinya...",opts:['Dosa kecil','Perbuatan yang sangat keji','Kesalahan yang bisa dimaafkan','Pelanggaran ringan','Dosa biasa'],ans:1},
{q:'Berikut yang termasuk perbuatan mendekati zina (muqaddimah zina) adalah...',opts:['Belajar bersama di sekolah','Berduaan (khalwat) bukan mahram di tempat sepi','Berkomunikasi untuk keperluan belajar','Bekerja sama dalam proyek','Berkenalan di depan umum'],ans:1},
{q:'Hikmah utama diharamkannya zina adalah untuk menjaga...',opts:['Harta benda','Nasab/keturunan dan kehormatan','Kekayaan negara','Keamanan masyarakat','Stabilitas ekonomi'],ans:1},
{q:'Q.S. An-Nur ayat 2 membahas tentang...',opts:['Larangan mencuri','Larangan membunuh','Hukuman bagi pezina','Kewajiban berpuasa','Larangan minum khamr'],ans:2},
{q:"Syu'abul iman secara bahasa berarti...",opts:['Rukun iman','Cabang-cabang keimanan','Tingkatan Islam','Syarat sah iman','Pokok-pokok agama'],ans:1},
{q:"Khauf dalam konteks syu'abul iman adalah...",opts:['Berharap mendapat rahmat Allah','Berserah diri kepada Allah','Rasa takut kepada Allah atas dosa dan azab-Nya','Bersyukur atas nikmat Allah','Sabar dalam cobaan'],ans:2},
{q:"Raja' secara istilah berarti...",opts:['Takut kepada Allah','Berserah diri kepada Allah','Berharap mendapatkan rahmat dan ampunan Allah','Ikhlas dalam beribadah','Tunduk kepada perintah Allah'],ans:2},
{q:'Tawakal yang benar dalam Islam adalah...',opts:['Pasrah total tanpa berusaha sama sekali','Berusaha maksimal lalu menyerahkan hasilnya kepada Allah','Hanya berdoa tanpa bekerja','Bekerja keras tanpa berdoa','Mengandalkan kemampuan diri sepenuhnya'],ans:1},
{q:'Seseorang yang memiliki sifat khauf yang benar akan...',opts:['Terus melakukan maksiat karena merasa aman','Putus asa dari rahmat Allah','Berhati-hati agar tidak melanggar syariat','Tidak mau beribadah karena takut berlebihan','Selalu cemas berlebihan dan tidak produktif'],ans:2},
{q:"Contoh perilaku raja' dalam kehidupan sehari-hari adalah...",opts:['Putus asa dan tidak mau bertaubat','Tidak mau beribadah','Tetap berdoa dan berharap ampunan Allah meski banyak berbuat dosa','Menganggap diri paling suci','Meremehkan dosa karena yakin pasti diampuni'],ans:2},
{q:"Keseimbangan antara khauf dan raja' dalam diri seorang muslim menghasilkan...",opts:['Sifat sombong','Sifat putus asa','Kepribadian yang matang dan seimbang dalam beribadah','Sifat malas beribadah','Sikap acuh tak acuh'],ans:2},
{q:"Orang yang berlebihan dalam khauf hingga berputus asa dari rahmat Allah, sikapnya termasuk...",opts:['Terpuji dan disunnahkan',"Seimbang antara khauf dan raja'",'Salah dan terlarang dalam Islam','Tingkatan iman tertinggi','Sama dengan tawakal yang benar'],ans:2},
{q:'Ghadhab adalah sifat...',opts:['Berani membela kebenaran','Pemarah yang tidak terkendali','Sabar menghadapi cobaan','Dermawan kepada sesama','Jujur dalam perkataan'],ans:1},
{q:"Syaja'ah adalah sifat...",opts:['Marah tanpa alasan yang jelas','Takut menghadapi tantangan','Berani membela kebenaran berdasarkan pertimbangan matang','Nekat tanpa pertimbangan','Sombong dan angkuh'],ans:2},
{q:"Perbedaan syaja'ah dengan tahawwur adalah...",opts:["Syaja'ah nekat tanpa pikir, tahawwur berdasarkan kebenaran","Syaja'ah berdasarkan kebenaran dan pertimbangan matang, tahawwur nekat tanpa dasar",'Keduanya sama-sama terpuji',"Tahawwur lebih baik dari syaja'ah",'Keduanya adalah sifat yang dicela'],ans:1},
{q:'Cara mengendalikan ghadhab sesuai sunnah Nabi SAW adalah...',opts:['Membalas kemarahan dengan kemarahan',"Berwudhu dan mengucap ta'awudz",'Berteriak sekuat tenaga','Memukul benda di sekitar','Pergi ke tempat ramai'],ans:1},
{q:"Contoh perilaku syaja'ah dalam kehidupan sehari-hari adalah...",opts:['Berkelahi karena hal sepele','Berani menegur teman yang berbuat curang dalam ujian','Marah-marah tanpa sebab jelas','Melawan orang tua tanpa alasan','Membuat keributan di sekolah'],ans:1},

{q:'Ghadhab yang tidak terkendali dapat menyebabkan hal berikut, kecuali...',opts:['Memutus tali silaturahmi','Merusak hubungan persaudaraan','Menyesali perbuatan','Memperkuat ikatan persahabatan','Menimbulkan permusuhan'],ans:3},
{q:'Siswa yang berani melaporkan tindakan bullying di sekolah kepada guru merupakan contoh...',opts:['Ghadhab','Tahawwur',"Syaja'ah",'Takabur','Hasad'],ans:2},
{q:'Riba secara bahasa berarti...',opts:['Berkurang','Tetap sama','Bertambah atau berlipat ganda','Bagi hasil yang adil','Keuntungan yang halal'],ans:2},
{q:'Hukum riba dalam Islam adalah...',opts:['Mubah (boleh)','Makruh','Sunnah','Haram','Boleh dalam kondisi darurat'],ans:3},
{q:'Gharar dalam transaksi ekonomi Islam berarti...',opts:['Keuntungan yang besar','Transaksi yang mengandung ketidakpastian dan penipuan','Jual beli yang sah dan halal','Bagi hasil yang adil','Akad yang transparan'],ans:1},
{q:'Maysir dalam ekonomi syariah adalah...',opts:['Akad bagi hasil yang sah','Jual beli barang halal','Perjudian atau untung-untungan','Bunga pinjaman','Sewa menyewa yang halal'],ans:2},
{q:'Mudharabah adalah akad kerja sama antara...',opts:['Dua orang pembeli','Dua orang penjual','Pemilik modal (shahibul mal) dan pengelola (mudharib) dengan bagi hasil','Bank dan nasabah biasa','Pemerintah dan pengusaha'],ans:2},
{q:'Bunga bank yang bersifat tetap tanpa memandang untung/rugi termasuk kategori...',opts:['Mudharabah','Musyarakah','Riba','Murabahah','Ijarah'],ans:2},
{q:'Contoh transaksi yang mengandung unsur gharar adalah...',opts:['Membeli baju yang jelas ukuran dan warnanya','Jual beli ikan yang masih di lautan (belum ditangkap)','Menyewa rumah dengan harga yang disepakati','Membeli makanan dengan harga tertulis','Akad mudharabah dengan nisbah bagi hasil yang jelas'],ans:1},
{q:'Dalam akad mudharabah, jika rugi bukan karena kelalaian pengelola, kerugian ditanggung oleh...',opts:['Pengelola (mudharib)','Pemilik modal (shahibul mal)','Keduanya sama rata','Pemerintah','Lembaga asuransi'],ans:1},
{q:'Dalil keharaman riba dalam Al-Quran terdapat dalam surat...',opts:['Q.S. Al-Baqarah: 275','Q.S. Al-Isra: 32','Q.S. An-Nur: 2','Q.S. Al-Maidah: 90','Q.S. An-Nisa: 29'],ans:0},

{q:'Larangan minum minuman keras (khamr) dalam Islam bertujuan menjaga...',opts:["Hifz ad-din (agama)","Hifz an-nafs (jiwa)","Hifz al-'aql (akal)","Hifz an-nasl (keturunan)","Hifz al-mal (harta)"],ans:2},
{q:'Larangan membunuh seseorang tanpa hak adalah bentuk perlindungan terhadap...',opts:["Hifz ad-din","Hifz an-nafs","Hifz al-'aql","Hifz an-nasl","Hifz al-mal"],ans:1},
{q:'Larangan mencuri dalam Islam adalah wujud perlindungan terhadap...',opts:["Hifz ad-din","Hifz an-nafs","Hifz al-'aql","Hifz an-nasl","Hifz al-mal"],ans:4},
{q:'Larangan zina dalam Islam bertujuan menjaga...',opts:["Hifz ad-din","Hifz an-nafs","Hifz al-'aql","Hifz an-nasl","Hifz al-mal"],ans:3},
{q:'Kewajiban menuntut ilmu dan larangan hal-hal yang merusak kemampuan berpikir termasuk perlindungan...',opts:["Hifz al-mal","Hifz an-nasl","Hifz al-'aql","Hifz an-nafs","Hifz ad-din"],ans:2},
{q:'Maqashid syariah secara bahasa berarti...',opts:['Hukum-hukum Islam','Tujuan atau maksud diturunkannya syariat Islam','Rukun Islam yang lima','Cabang-cabang keimanan','Sejarah perkembangan Islam'],ans:1},
{q:'Seorang siswa yang rajin belajar dan tidak menggunakan narkoba sedang mewujudkan nilai...',opts:["Hifz al-mal","Hifz an-nafs","Hifz al-'aql","Hifz an-nasl","Hifz ad-din"],ans:2},
{q:'Kewajiban mendirikan sholat lima waktu merupakan perwujudan dari...',opts:["Hifz al-mal","Hifz an-nafs","Hifz al-'aql","Hifz an-nasl","Hifz ad-din"],ans:4},
{q:'Jumlah Wali Songo adalah...',opts:['7 orang','8 orang','9 orang','10 orang','12 orang'],ans:2},
{q:'Nama asli Sunan Kalijaga adalah...',opts:['Raden Mas Syahid','Raden Paku','Raden Rahmat','Raden Umar Said','Ibrahim As-Samarqandi'],ans:0},
{q:'Sunan Kalijaga dikenal menggunakan media dalam berdakwah berupa...',opts:['Gamelan saja','Wayang kulit','Ketoprak','Ludruk','Reog Ponorogo'],ans:1},
{q:'Sunan Gunungjati menyebarkan Islam di daerah...',opts:['Surabaya','Tuban','Cirebon dan Jawa Barat','Kudus','Demak'],ans:2},
{q:'Sunan Bonang dikenal dengan media dakwah berupa...',opts:['Gitar','Suling tradisional','Bonang (alat musik gamelan)','Kendang','Siter'],ans:2},
{q:'Nama asli Sunan Ampel adalah...',opts:['Raden Mas Syahid','Raden Rahmat','Raden Paku','Maulana Malik Ibrahim','Raden Umar Said'],ans:1},
{q:'Pendekatan dakwah Wali Songo yang menggunakan seni dan budaya lokal disebut...',opts:['Dakwah bil lisan','Dakwah bil hal','Dakwah kultural (akulturasi budaya)','Dakwah bil qalam','Dakwah bil qital'],ans:2},
{q:'Sunan Kudus melarang penyembelihan sapi sebagai bentuk...',opts:['Larangan makan daging sapi','Toleransi kepada penganut Hindu yang menghormati sapi','Ajaran vegetarianisme','Perintah dari raja','Tradisi lokal semata'],ans:1},
];

// ── STATE ──
let qs=[],shuffled=false,cur=0,score=0,wrongs=[],waiting=false;
const L='ABCDE';
const $=id=>document.getElementById(id);

// ── UTILITIES ──
function rnd(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}

// ── SHUFFLE TOGGLE ──
function toggleShuffle(){
  shuffled=!shuffled;
  const b=$('bsh');
  if(shuffled){b.className='btn-sh on';b.innerHTML='✅ Teracak';}
  else{b.className='btn-sh';b.innerHTML='🔀 Acak';}
  start();
}

// ── PREPARE QUESTIONS ──
function prep(){
  let q=B.map(x=>({q:x.q,opts:[...x.opts],ans:x.ans}));
  if(shuffled){
    q=rnd(q);
    q=q.map(x=>{const i=rnd([0,1,2,3,4]);return{q:x.q,opts:i.map(j=>x.opts[j]),ans:i.indexOf(x.ans)};});
  }
  return q;
}

// ── START / RESET ──
function start(){qs=prep();cur=0;score=0;wrongs=[];waiting=false;draw();}

// ── HEADER UPDATE ──
function upd(){
  const p=qs.length?cur/qs.length*100:0;
  $('pb').style.width=p+'%';
  $('pl').textContent=score+'/'+cur;
  $('hs').textContent=cur<qs.length?`Soal ${cur+1} / ${qs.length}`:'Selesai!';
}

// ── RENDER QUESTION ──
function draw(){
  if(cur>=qs.length){endScr();return;}
  upd();
  const q=qs[cur];
  const o=q.opts.map((t,i)=>`
    <div class="opt" id="o${i}" onclick="pick(${i})">
      <div class="ol">${L[i]}</div>
      <div class="ot">${t}</div>
    </div>`).join('');
  $('main').innerHTML=`
    <div class="body">
      <div class="q-badge"><span class="dot"></span>Soal ${cur+1} / ${qs.length}</div>
      <div class="q-txt">${q.q}</div>
      <div class="opts">${o}</div>
      <div id="fb" class="fb"></div>
      <button id="nxt" class="btn-nxt" onclick="next()">Soal Berikutnya →</button>
    </div>`;
  waiting=false;
}

// ── ANSWER ──
function pick(i){
  if(waiting)return;waiting=true;
  const q=qs[cur];const ok=i===q.ans;
  document.querySelectorAll('.opt').forEach(e=>e.classList.add('dis'));
  $('o'+i).classList.add(ok?'ok':'bad');
  if(!ok)$('o'+q.ans).classList.add('ok');
  const fb=$('fb');
  if(ok){
    score++;
    fb.className='fb ok-fb show';
    fb.innerHTML='✅ <strong>Benar!</strong> Jawaban kamu tepat.';
    burst($('o'+i));
  }else{
    fb.className='fb bad-fb show';
    fb.innerHTML=`❌ <strong>Salah.</strong> Jawaban benar: <strong>${L[q.ans]}. ${q.opts[q.ans]}</strong>`;
    if(navigator.vibrate)navigator.vibrate([180,80,180]);
    wrongs.push({n:cur+1,q:q.q,ux:`${L[i]}. ${q.opts[i]}`,cx:`${L[q.ans]}. ${q.opts[q.ans]}`});
  }
  $('nxt').classList.add('show');
}

function next(){cur++;draw();}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&waiting)next();});

// ── END SCREEN ──
function endScr(){
  $('pb').style.width='100%';
  $('pl').textContent=score+'/'+qs.length;
  $('hs').textContent='Selesai!';
  const tot=qs.length,bad=tot-score,pct=Math.round(score/tot*100);
  const cfg=pct===100?['🏆','Nilai Sempurna!','Semua jawaban benar! Kamu luar biasa!']:
             pct>=80?['🎉','Luar Biasa!','Hasil sangat baik, terus pertahankan!']:
             pct>=60?['👍','Bagus!','Sudah cukup baik, sedikit lagi bisa sempurna!']:
                     ['💪','Tetap Semangat!','Pelajari lagi soal yang salah ya!'];
  $('main').innerHTML=`
    <div class="end">
      <div class="end-emoji">${cfg[0]}</div>
      <div class="end-title">${cfg[1]}</div>
      <div class="end-sub">${cfg[2]}</div>
      <div class="big-s">${pct}%</div>
      <div class="s-sub">${score} dari ${tot} soal benar</div>
      <div class="stat-row">
        <div class="stat g"><div class="stat-n">${score}</div><div class="stat-l">✅ Benar</div></div>
        <div class="stat r"><div class="stat-n">${bad}</div><div class="stat-l">❌ Salah</div></div>
      </div>
      <div class="btn-row">
        ${bad>0
          ?`<button class="btn-out" onclick="rvScr()">🔍 Lihat ${bad} Soal yang Salah</button>`
          :`<div class="all-ok">🌟 Tidak ada soal yang salah!</div>`
        }
        <button class="btn-main" onclick="start()">🔄 Ulangi Kuis</button>
      </div>
    </div>`;
}

// ── REVIEW SCREEN ──
function rvScr(){
  $('main').innerHTML=`
    <div class="rv">
      <div class="rv-hdr">
        <button class="btn-bk" onclick="endScr()">←</button>
        <div>
          <div class="rv-title">Soal yang Salah</div>
          <div class="rv-count">${wrongs.length} soal perlu dipelajari ulang</div>
        </div>
      </div>
      ${wrongs.map(w=>`
        <div class="rv-item">
          <div class="rv-n">Soal ${w.n}</div>
          <div class="rv-q">${w.q}</div>
          <div class="rv-row"><span class="rv-badge bx">Jawabanmu</span><span class="rv-ans">${w.ux}</span></div>
          <div class="rv-row"><span class="rv-badge bok">Benar</span><span class="rv-ans c">${w.cx}</span></div>
        </div>`).join('')}
      <button class="btn-main" style="width:100%;margin-top:8px" onclick="start()">🔄 Coba Lagi</button>
    </div>`;
}

// ── PARTICLE BURST ──
function burst(el){
  const r=el?el.getBoundingClientRect():{left:window.innerWidth/2-50,top:window.innerHeight/3,width:100,height:50};
  const cx=r.left+r.width/2,cy=r.top+r.height/2;
  const cols=['#4338ca','#7c3aed','#10b981','#f59e0b','#ec4899','#06b6d4','#f97316','#8b5cf6'];
  const shapes=['50%','3px','0%'];
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='pk';
    const sz=5+Math.random()*9;
    const angle=Math.random()*Math.PI*2;
    const dist=60+Math.random()*80;
    const dx=(Math.cos(angle)*dist).toFixed(1)+'px';
    const dy=(Math.sin(angle)*dist-40).toFixed(1)+'px';
    const dr=(Math.random()*720-360).toFixed(0)+'deg';
    p.style.cssText=`left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;`+
      `background:${cols[0|Math.random()*cols.length]};`+
      `border-radius:${shapes[0|Math.random()*shapes.length]};`+
      `animation-duration:${.65+Math.random()*.55}s;`+
      `animation-delay:${Math.random()*.12}s;`+
      `--dx:${dx};--dy:${dy};--dr:${dr};`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1400);
  }
}

// ── INIT ──
start();
</script>
</body>
</html>
