<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis IPA Dasar - Cerdas Cermat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-body: #F3F4F6;
            --bg-card: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --primary: #3B82F6;
            --primary-hover: #EFF6FF;
            --correct: #10B981;
            --correct-bg: #D1FAE5;
            --wrong: #EF4444;
            --wrong-bg: #FEE2E2;
            --border: #E5E7EB;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 550px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            position: relative;
        }

        /* Timer Bar */
        .timer-container {
            width: 100%;
            height: 6px;
            background-color: var(--border);
        }

        .timer-bar {
            height: 100%;
            width: 100%;
            background-color: var(--primary);
            transition: width 1s linear, background-color 0.3s;
        }

        .timer-warning {
            background-color: var(--wrong);
        }

        .card-content {
            padding: 30px 40px 40px;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .question {
            font-size: 1.35rem;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 30px;
            color: var(--text-main);
        }

        .options-grid {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            background-color: #FFFFFF;
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 1.05rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            color: var(--text-main);
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background-color: var(--primary-hover);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        /* States */
        .option-btn.correct {
            border-color: var(--correct);
            background-color: var(--correct-bg);
            color: #065F46;
        }

        .option-btn.wrong {
            border-color: var(--wrong);
            background-color: var(--wrong-bg);
            color: #991B1B;
        }

        /* Result Screen */
        #result-screen {
            display: none;
            text-align: center;
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            background-color: var(--correct-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .icon-wrapper svg {
            width: 40px;
            height: 40px;
            color: var(--correct);
        }

        .score-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .score-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .stat-box {
            background-color: var(--bg-body);
            padding: 15px 25px;
            border-radius: 12px;
        }

        .stat-num {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .text-green { color: var(--correct); }
        .text-red { color: var(--wrong); }

    </style>
    <script src="https://pl30147374.effectivecpmnetwork.com/22/f3/1a/22f31ad94eff04da12d12569a3bc7eb4.js"></script>

</head>
<body>

    <div class="container">
        <div class="card" id="quiz-card">
            <!-- Timer -->
            <div class="timer-container" id="timer-container">
                <div class="timer-bar" id="timer-bar"></div>
            </div>

            <!-- Quiz Content -->
            <div class="card-content" id="quiz-screen">
                <div class="header-info">
                    <span id="progress-text">Soal 1 / 10</span>
                    <span id="time-text">10s</span>
                </div>
                
                <div class="question" id="question-text">Memuat soal...</div>
                
                <div class="options-grid" id="options-container">
                    <!-- Options injected here via JS -->
                </div>
            </div>

            <!-- Result Content -->
            <div class="card-content" id="result-screen">
                <div class="icon-wrapper">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <div class="score-title">Kuis Selesai!</div>
                <p style="color: var(--text-muted); margin-bottom: 10px;" id="result-message"></p>
                
                <div class="score-stats">
                    <div class="stat-box">
                        <div class="stat-num text-green" id="stat-correct">0</div>
                        <div class="stat-label">Benar</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-num text-red" id="stat-wrong">0</div>
                        <div class="stat-label">Salah / Telat</div>
                    </div>
                </div>
                
                <p style="font-size: 0.9rem; color: var(--text-muted); margin-top: 20px;">
                    Refresh halaman (F5) untuk mengulang kuis.
                </p>
            </div>
        </div>
    </div>

    <script>
        // Database Soal IPA + Pilihan Ganda Pengecoh
        const dbQuestions = [
            // Tata Surya
            { q: "Planet terbesar dalam tata surya?", opts: ["Saturnus", "Jupiter", "Bumi", "Uranus"], ans: "Jupiter" },
            { q: "Planet yang dijuluki Planet Merah?", opts: ["Venus", "Mars", "Jupiter", "Merkurius"], ans: "Mars" },
            { q: "Planet yang paling dekat dengan Matahari?", opts: ["Venus", "Bumi", "Merkurius", "Mars"], ans: "Merkurius" },
            { q: "Satelit alami Bumi?", opts: ["Matahari", "Bintang", "Komet", "Bulan"], ans: "Bulan" },
            { q: "Pusat tata surya?", opts: ["Bumi", "Bulan", "Matahari", "Jupiter"], ans: "Matahari" },
            { q: "Planet bercincin yang terkenal?", opts: ["Saturnus", "Uranus", "Neptunus", "Jupiter"], ans: "Saturnus" },
            { q: "Akibat dari rotasi Bumi?", opts: ["Pergantian musim", "Siang dan malam", "Gerhana bulan", "Fase bulan"], ans: "Siang dan malam" },
            { q: "Akibat dari revolusi Bumi?", opts: ["Siang dan malam", "Perbedaan waktu", "Pergantian musim", "Pasang surut air laut"], ans: "Pergantian musim" },
            
            // Tubuh Manusia
            { q: "Organ pernapasan manusia?", opts: ["Jantung", "Hati", "Paru-paru", "Ginjal"], ans: "Paru-paru" },
            { q: "Organ yang memompa darah ke seluruh tubuh?", opts: ["Paru-paru", "Jantung", "Ginjal", "Lambung"], ans: "Jantung" },
            { q: "Organ yang menyaring darah dan menghasilkan urin?", opts: ["Hati", "Pankreas", "Usus", "Ginjal"], ans: "Ginjal" },
            { q: "Organ pencernaan tempat makanan dicerna secara kimia dan mekanik?", opts: ["Kerongkongan", "Lambung", "Usus Besar", "Mulut"], ans: "Lambung" },
            { q: "Berapa jumlah ruang jantung manusia?", opts: ["2", "3", "4", "5"], ans: "4" },
            { q: "Sel darah merah berfungsi membawa apa?", opts: ["Karbondioksida", "Sari makanan", "Penyakit", "Oksigen"], ans: "Oksigen" },

            // Fotosintesis
            { q: "Gas yang dibutuhkan tumbuhan saat fotosintesis?", opts: ["Oksigen (O₂)", "Karbon dioksida (CO₂)", "Nitrogen", "Hidrogen"], ans: "Karbon dioksida (CO₂)" },
            { q: "Zat cair yang dibutuhkan tumbuhan saat fotosintesis?", opts: ["Minyak", "Air (H₂O)", "Getah", "Klorofil"], ans: "Air (H₂O)" },
            { q: "Gas yang dihasilkan tumbuhan saat fotosintesis?", opts: ["Oksigen (O₂)", "Karbon dioksida (CO₂)", "Karbon monoksida", "Uap air"], ans: "Oksigen (O₂)" },
            { q: "Hasil utama fotosintesis sebagai makanan tumbuhan?", opts: ["Garam", "Vitamin", "Glukosa", "Protein"], ans: "Glukosa" },
            { q: "Zat hijau daun yang berperan dalam fotosintesis?", opts: ["Kloroplas", "Klorofil", "Stomata", "Kambium"], ans: "Klorofil" },
            { q: "Fotosintesis terjadi terutama pada bagian tumbuhan apa?", opts: ["Akar", "Batang", "Bunga", "Daun"], ans: "Daun" },

            // Satuan
            { q: "Satuan gaya dalam Sistem Internasional (SI)?", opts: ["Joule", "Newton", "Watt", "Pascal"], ans: "Newton" },
            { q: "Satuan energi dalam SI?", opts: ["Newton", "Watt", "Joule", "Volt"], ans: "Joule" },
            { q: "Satuan tegangan listrik?", opts: ["Ampere", "Ohm", "Watt", "Volt"], ans: "Volt" },
            { q: "Satuan arus listrik?", opts: ["Volt", "Ohm", "Ampere", "Joule"], ans: "Ampere" },
            { q: "Satuan hambatan listrik?", opts: ["Ohm", "Volt", "Ampere", "Watt"], ans: "Ohm" },
            { q: "Satuan daya listrik?", opts: ["Joule", "Newton", "Watt", "Volt"], ans: "Watt" },

            // Perubahan Wujud
            { q: "Perubahan es menjadi air disebut?", opts: ["Membeku", "Mencair", "Menguap", "Menyublim"], ans: "Mencair" },
            { q: "Perubahan air menjadi es disebut?", opts: ["Mencair", "Membeku", "Mengembun", "Mengkristal"], ans: "Membeku" },
            { q: "Perubahan air menjadi uap disebut?", opts: ["Mengembun", "Mencair", "Menguap", "Menyublim"], ans: "Menguap" },
            { q: "Perubahan uap air menjadi titik-titik air disebut?", opts: ["Mengembun", "Menguap", "Mengkristal", "Mencair"], ans: "Mengembun" },
            { q: "Perubahan kapur barus menjadi gas disebut?", opts: ["Menguap", "Mengkristal", "Menyublim", "Mengembun"], ans: "Menyublim" },

            // Soal Receh Penjebak
            { q: "Matahari termasuk planet atau bintang?", opts: ["Satelit", "Komet", "Planet", "Bintang"], ans: "Bintang" },
            { q: "Bunyi membutuhkan apa untuk merambat?", opts: ["Cahaya", "Ruang hampa", "Medium", "Magnet"], ans: "Medium" },
            { q: "Cahaya merambat secara?", opts: ["Melengkung", "Lurus", "Ziczac", "Berbelok"], ans: "Lurus" },
            { q: "Air membeku pada suhu berapa?", opts: ["0°C", "10°C", "-10°C", "100°C"], ans: "0°C" },
            { q: "Air mendidih pada suhu berapa?", opts: ["50°C", "90°C", "100°C", "150°C"], ans: "100°C" },
            { q: "Hewan bertelur disebut?", opts: ["Vivipar", "Ovovivipar", "Ovipar", "Herbivora"], ans: "Ovipar" },
            { q: "Hewan melahirkan disebut?", opts: ["Ovipar", "Ovovivipar", "Karnivora", "Vivipar"], ans: "Vivipar" },
            { q: "Hewan pemakan tumbuhan disebut?", opts: ["Karnivora", "Herbivora", "Omnivora", "Insektivora"], ans: "Herbivora" }
        ];

        // Acak urutan soal biar tidak mudah ditebak
        let questions = [...dbQuestions].sort(() => Math.random() - 0.5);
        
        const TIME_LIMIT = 10; // 10 detik per soal
        let currentIndex = 0;
        let correctCount = 0;
        let wrongCount = 0;
        let timeLeft;
        let timerInterval;

        const timerBar = document.getElementById('timer-bar');
        const timerContainer = document.getElementById('timer-container');
        const timeText = document.getElementById('time-text');
        const progressText = document.getElementById('progress-text');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');

        // Fungsi Load Soal
        function loadQuestion() {
            if (currentIndex >= questions.length) {
                showResults();
                return;
            }

            const currentQ = questions[currentIndex];
            progressText.innerText = `Soal ${currentIndex + 1} / ${questions.length}`;
            questionText.innerText = currentQ.q;
            
            // Acak urutan pilihan ganda
            let shuffledOpts = [...currentQ.opts].sort(() => Math.random() - 0.5);
            
            optionsContainer.innerHTML = '';
            shuffledOpts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => selectAnswer(btn, opt, currentQ.ans);
                optionsContainer.appendChild(btn);
            });

            startTimer();
        }

        // Fungsi Timer
        function startTimer() {
            timeLeft = TIME_LIMIT;
            timeText.innerText = `${timeLeft}s`;
            timerBar.style.transition = 'none';
            timerBar.style.width = '100%';
            timerBar.classList.remove('timer-warning');
            
            // Force reflow agar animasi CSS jalan
            void timerBar.offsetWidth;
            
            timerBar.style.transition = `width ${TIME_LIMIT}s linear`;
            timerBar.style.width = '0%';

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timeText.innerText = `${timeLeft}s`;
                
                if (timeLeft <= 3) {
                    timerBar.classList.add('timer-warning');
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleTimeout();
                }
            }, 1000);
        }

        // Jika waktu habis
        function handleTimeout() {
            wrongCount++;
            lockOptions();
            
            // Cari tombol yang benar dan beri warna hijau
            const buttons = document.querySelectorAll('.option-btn');
            const currentQ = questions[currentIndex];
            buttons.forEach(btn => {
                if (btn.innerText === currentQ.ans) {
                    btn.classList.add('correct');
                }
            });

            // Lanjut ke soal berikutnya
            setTimeout(() => {
                currentIndex++;
                loadQuestion();
            }, 1200);
        }

        // Pengecekan saat tombol diklik
        function selectAnswer(btn, selectedAns, correctAns) {
            clearInterval(timerInterval);
            lockOptions();
            
            // Stop animasi bar
            const computedWidth = window.getComputedStyle(timerBar).width;
            timerBar.style.transition = 'none';
            timerBar.style.width = computedWidth;

            if (selectedAns === correctAns) {
                correctCount++;
                btn.classList.add('correct');
            } else {
                wrongCount++;
                btn.classList.add('wrong');
                // Tunjukkan jawaban yang benar
                const buttons = document.querySelectorAll('.option-btn');
                buttons.forEach(b => {
                    if (b.innerText === correctAns) {
                        b.classList.add('correct');
                    }
                });
            }

            // Lanjut ke soal berikutnya setelah otak merekam warna (1.2 detik)
            setTimeout(() => {
                currentIndex++;
                loadQuestion();
            }, 1200);
        }

        // Mengunci tombol agar tidak bisa diklik dua kali
        function lockOptions() {
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                btn.disabled = true;
            });
        }

        // Menampilkan Layar Akhir
        function showResults() {
            document.getElementById('quiz-screen').style.display = 'none';
            timerContainer.style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';

            document.getElementById('stat-correct').innerText = correctCount;
            document.getElementById('stat-wrong').innerText = wrongCount;

            const msgEl = document.getElementById('result-message');
            const percentage = (correctCount / questions.length) * 100;

            if (percentage >= 85) {
                msgEl.innerText = "Luar Biasa! Kamu sangat siap untuk cerdas cermat.";
            } else if (percentage >= 60) {
                msgEl.innerText = "Kerja bagus! Reaksimu sudah cukup cepat.";
            } else {
                msgEl.innerText = "Masih kurang cepat dan tepat. Coba lagi untuk melatih memori ototmu!";
            }
        }

        // Mulai kuis
        window.onload = loadQuestion;

    </script>
